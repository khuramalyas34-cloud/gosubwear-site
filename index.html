<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOSUBWEAR | Mobile Premium Shop</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --amazon-dark: #131921;
            --amazon-light: #232f3e;
            --gosub-orange: #FF6600;
            --amazon-yellow: #FFD814;
            --amazon-yellow-hover: #F7CA00;
            --bg-canvas: #eaeded;
            --text-link: #007185;
            --price-red: #B12704;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Arial', sans-serif; background-color: var(--bg-canvas); color: #111; overflow-x: hidden; }

        /* --- MOBILE RESPONSIVE HEADER --- */
        header { background: var(--amazon-dark); color: white; position: sticky; top: 0; z-index: 2000; width: 100%; }
        
        .nav-main { 
            display: flex; 
            align-items: center; 
            padding: 5px 10px; 
            height: 60px; 
            justify-content: space-between;
        }
        
        .logo-box { font-family: 'Orbitron'; font-size: 1.2rem; font-weight: 900; cursor: pointer; color: white; text-decoration: none; }
        .logo-box span { color: var(--gosub-orange); }

        /* Search bar hides/shrinks on very small screens or stacks */
        .nav-search { 
            flex-grow: 1; 
            display: flex; 
            height: 35px; 
            margin: 0 8px; 
            border-radius: 4px; 
            overflow: hidden; 
        }
        .search-input { flex-grow: 1; border: none; padding: 0 8px; outline: none; font-size: 14px; width: 50px; }
        .search-btn { background: #febd69; width: 40px; border: none; cursor: pointer; color: #333; }

        .cart-box { position: relative; padding: 5px; cursor: pointer; }
        .cart-count { 
            position: absolute; top: -2px; right: -2px; 
            background: var(--gosub-orange); color: white; 
            font-weight: bold; font-size: 11px; 
            min-width: 18px; height: 18px; 
            border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; 
        }

        /* --- SCROLLABLE MOBILE MENU --- */
        .nav-sub { 
            background: white; 
            display: flex; 
            overflow-x: auto; 
            white-space: nowrap; 
            border-bottom: 1px solid #ddd;
            -webkit-overflow-scrolling: touch; /* Smooth scroll on iOS */
        }
        .nav-sub::-webkit-scrollbar { display: none; } /* Hide scrollbar */
        
        .nav-sub a { 
            padding: 12px 15px; 
            color: #333; 
            text-decoration: none; 
            font-size: 13px; 
            display: inline-block;
            border-bottom: 3px solid transparent; 
        }
        .nav-sub a.active { border-bottom: 3px solid var(--text-link); color: var(--text-link); font-weight: 600; }

        /* --- RESPONSIVE GRID --- */
        .container { width: 100%; max-width: 1500px; margin: 10px auto; padding: 0 10px; }
        
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* 2 columns on mobile */
            gap: 10px; 
        }

        @media (min-width: 768px) {
            .product-grid { grid-template-columns: repeat(3, 1fr); }
            .logo-box { font-size: 1.5rem; }
        }

        @media (min-width: 1024px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .p-card { 
            background: white; 
            padding: 10px; 
            border-radius: 4px; 
            border: 1px solid #eee; 
            display: flex; 
            flex-direction: column; 
        }
        
        .p-img-container { 
            height: 140px; 
            width: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #fff; 
        }
        .p-img-container img { max-height: 100%; max-width: 100%; object-fit: contain; }
        
        .p-title { font-size: 12px; margin: 8px 0; color: var(--text-link); height: 32px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .p-price { color: var(--price-red); font-weight: bold; font-size: 1rem; margin-bottom: 8px; }

        .buy-btn { 
            background: var(--amazon-yellow); 
            border: 1px solid #FCD200; 
            width: 100%; 
            padding: 8px; 
            border-radius: 20px; 
            font-weight: 600; 
            font-size: 12px;
            cursor: pointer; 
        }

        /* CHECKOUT MOBILE VIEW */
        #checkoutPage { display: none; background: white; padding: 15px; min-height: 80vh; }
        .checkout-item { display: flex; justify-content: space-between; font-size: 13px; padding: 10px 0; border-bottom: 1px solid #eee; }

        footer { background: var(--amazon-light); color: #DDD; padding: 30px 15px; text-align: center; font-size: 12px; }
    </style>
</head>
<body>

    <audio id="addSound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <header>
        <div class="nav-main">
            <div class="logo-box" onclick="showPage('home')">GOSUB<span>WEAR</span></div>
            <div class="nav-search">
                <input type="text" class="search-input" placeholder="Search...">
                <button class="search-btn"><i class="fas fa-search"></i></button>
            </div>
            <div class="cart-box" onclick="showPage('checkout')">
                <span class="cart-count" id="cartCount">0</span>
                <i class="fas fa-shopping-cart" style="font-size: 1.5rem;"></i>
            </div>
        </div>
        <nav class="nav-sub" id="mainMenu">
            <a onclick="menuSelect(this, 'All')" class="active">All</a>
            <a onclick="menuSelect(this, 'T-Shirts')">T-Shirts</a>
            <a onclick="menuSelect(this, 'Kids Clothes')">Kids Clothes</a>
            <a onclick="menuSelect(this, 'Elite Gear')">Elite Gear</a>
            <a href="#">Today's Deals</a>
            <a href="#">Customer Service</a>
        </nav>
    </header>

    <main id="homePage" class="container">
        <h4 id="catLabel" style="margin-bottom: 10px; color: #555;">All Products (105)</h4>
        <div class="product-grid" id="productGrid"></div>
    </main>

    <div id="checkoutPage">
        <h3>Your Shopping Bag</h3>
        <div id="cartItemsList" style="margin: 15px 0;"></div>
        <div style="border-top: 1px solid #333; padding-top: 15px;">
            <h4>Total: Rs. <span id="totalDisplay">0</span></h4>
            <p style="font-size: 11px; color: green; margin: 5px 0;">Includes Takaful Program Protection</p>
            <button class="buy-btn" style="height: 45px; margin-top: 10px;" onclick="alert('Order Placed!')">Place Order</button>
            <button class="buy-btn" style="background:#eee; border:1px solid #ccc; margin-top:10px;" onclick="showPage('home')">Continue Shopping</button>
        </div>
    </div>

    <footer>
        <p>© 2026 GOSUBWEAR - Takaful Protected (Shariah Ke Mutabiq Beema)</p>
        <p style="margin-top: 10px; opacity: 0.7;">Conditions of Use | Privacy Notice</p>
    </footer>

    <script>
        const categories = ["T-Shirts", "Kids Clothes", "Elite Gear"];
        const imgLinks = {
            "T-Shirts": "http://googleusercontent.com/image_collection/image_retrieval/18361583509117132435_0",
            "Kids Clothes": "http://googleusercontent.com/image_collection/image_retrieval/8812316806786778747_0",
            "Elite Gear": "http://googleusercontent.com/image_collection/image_retrieval/7870946826171413373_0"
        };
        
        const products = [];
        let cart = [];

        for(let i=1; i<=105; i++) {
            const cat = categories[i % categories.length];
            products.push({
                id: i,
                name: `${cat} Premium Sublimation #${i}`,
                category: cat,
                price: 2400 + (i * 8),
                image: imgLinks[cat]
            });
        }

        function renderProducts(list) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = list.map(p => `
                <div class="p-card">
                    <div class="p-img-container"><img src="${p.image}" alt="${p.name}"></div>
                    <div class="p-title">${p.name}</div>
                    <div class="p-price">Rs. ${p.price}</div>
                    <button class="buy-btn" onclick="addToBag(${p.id})">Add to Bag</button>
                </div>
            `).join('');
        }

        function addToBag(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            document.getElementById('cartCount').innerText = cart.length;
            
            const sound = document.getElementById('addSound');
            sound.currentTime = 0;
            sound.play().catch(() => {});

            const btn = event.target;
            btn.innerText = "✓ Added";
            btn.style.background = "#e7e9ec";
            setTimeout(() => { 
                btn.innerText = "Add to Bag"; 
                btn.style.background = "var(--amazon-yellow)";
            }, 600);
        }

        function showPage(page) {
            window.scrollTo(0,0);
            if(page === 'checkout') {
                document.getElementById('homePage').style.display = 'none';
                document.getElementById('checkoutPage').style.display = 'block';
                const list = document.getElementById('cartItemsList');
                let total = 0;
                list.innerHTML = cart.length ? cart.map(item => {
                    total += item.price;
                    return `<div class="checkout-item"><span>${item.name}</span><b>Rs. ${item.price}</b></div>`;
                }).join('') : "<p>Your bag is empty.</p>";
                document.getElementById('totalDisplay').innerText = total;
            } else {
                document.getElementById('homePage').style.display = 'block';
                document.getElementById('checkoutPage').style.display = 'none';
            }
        }

        function menuSelect(el, cat) {
            document.querySelectorAll('#mainMenu a').forEach(a => a.classList.remove('active'));
            el.classList.add('active');
            const filtered = cat === 'All' ? products : products.filter(p => p.category === cat);
            document.getElementById('catLabel').innerText = `${cat} (${filtered.length})`;
            renderProducts(filtered);
            showPage('home');
        }

        renderProducts(products);
    </script>
</body>
</html>
