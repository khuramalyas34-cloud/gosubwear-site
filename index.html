<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOSUBWEAR | Premium E-Commerce</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --amazon-dark: #131921;
            --amazon-light: #232f3e;
            --gosub-orange: #FF6600;
            --amazon-yellow: #FFD814;
            --amazon-yellow-hover: #F7CA00;
            --bg-canvas: #eaeded;
            --text-link: #007185;
            --price-red: #B12704;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background-color: var(--bg-canvas); color: #111; }

        /* HEADER SECTION */
        header { background: var(--amazon-dark); color: white; position: sticky; top: 0; z-index: 2000; }
        .nav-main { display: flex; align-items: center; padding: 5px 15px; height: 60px; gap: 10px; }
        
        .logo-box { font-family: 'Orbitron'; font-size: 1.4rem; font-weight: 900; border: 1px solid transparent; padding: 5px; cursor: pointer; }
        .logo-box:hover { border: 1px solid white; }
        .logo-box span { color: var(--gosub-orange); }

        .nav-search { flex-grow: 1; display: flex; height: 40px; margin: 0 10px; border-radius: 4px; overflow: hidden; }
        .search-input { flex-grow: 1; border: none; padding: 0 10px; outline: none; }
        .search-btn { background: #febd69; width: 45px; border: none; cursor: pointer; color: #333; font-size: 1.2rem; }

        .cart-box { position: relative; display: flex; align-items: center; padding: 5px 10px; border: 1px solid transparent; cursor: pointer; text-decoration: none; color: white; }
        .cart-count { position: absolute; top: 2px; left: 22px; color: #f08804; font-weight: bold; font-size: 16px; }

        /* WHITE MENU SECTION */
        .nav-sub { background: white; color: #333; display: flex; padding: 0 15px; border-bottom: 1px solid #ddd; }
        .nav-sub a { padding: 12px 15px; cursor: pointer; color: #333; text-decoration: none; font-size: 14px; border-bottom: 3px solid transparent; }
        .nav-sub a.active { border-bottom: 3px solid var(--text-link); font-weight: 600; color: var(--text-link); }

        /* PRODUCT GRID */
        .container { max-width: 1500px; margin: 20px auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; }
        .p-card { background: white; padding: 20px; border-radius: 4px; border: 1px solid #eee; transition: 0.3s; }
        .p-img { height: 180px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 3rem; color: #ddd; }
        
        /* YELLOW BUTTON */
        .buy-btn { background: var(--amazon-yellow); border: 1px solid #FCD200; width: 100%; padding: 10px; border-radius: 20px; margin-top: 15px; font-weight: 600; cursor: pointer; }
        .buy-btn:hover { background: var(--amazon-yellow-hover); }

        /* FOOTER */
        footer { background: var(--amazon-light); color: #DDD; padding: 40px 20px; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

    <audio id="addSound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <header>
        <div class="nav-main">
            <div class="logo-box" onclick="location.reload()">GOSUB<span>WEAR</span></div>
            <div class="nav-search">
                <input type="text" class="search-input" placeholder="Search GOSUBWEAR">
                <button class="search-btn"><i class="fas fa-search"></i></button>
            </div>
            <div class="cart-box">
                <span class="cart-count" id="cartCount">0</span>
                <i class="fas fa-shopping-cart" style="font-size: 1.8rem;"></i>
            </div>
        </div>
        <div class="nav-sub" id="mainMenu">
            <a onclick="menuSelect(this, 'All')" class="active">All Products</a>
            <a onclick="menuSelect(this, 'T-Shirts')">T-Shirts</a>
            <a onclick="menuSelect(this, 'Kids Clothes')">Kids Clothes</a>
            <a onclick="menuSelect(this, 'Elite Gear')">Elite Gear</a>
        </div>
    </header>

    <main class="container">
        <h2 id="catLabel" style="margin-bottom: 20px;">All Products (105)</h2>
        <div class="product-grid" id="productGrid"></div>
    </main>

    <footer>
        <p>© 2026 GOSUBWEAR - Takaful Program Protected</p>
    </footer>

    <script>
        const categories = ["T-Shirts", "Kids Clothes", "Elite Gear"];
        const products = [];
        let cartCount = 0;

        // Sound Function
        function playAddSound() {
            const sound = document.getElementById('addSound');
            sound.currentTime = 0; // Reset to start
            sound.play().catch(e => console.log("Audio needs user interaction first."));
        }

        // Generate 105 products
        for(let i=1; i<=105; i++) {
            const cat = categories[i % categories.length];
            products.push({
                id: i,
                name: `${cat} Series v.${i}`,
                category: cat,
                price: 2500 + (i * 5),
                icon: cat === "Kids Clothes" ? "fa-child" : "fa-tshirt"
            });
        }

        function renderProducts(list) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = list.map(p => `
                <div class="p-card">
                    <div class="p-img"><i class="fas ${p.icon}"></i></div>
                    <div style="font-size:14px; margin:10px 0;">${p.name}</div>
                    <div style="color:var(--price-red); font-weight:bold;">Rs. ${p.price}</div>
                    <button class="buy-btn" onclick="addToBag()">Add to Bag</button>
                </div>
            `).join('');
        }

        function addToBag() {
            cartCount++;
            document.getElementById('cartCount').innerText = cartCount;
            playAddSound(); // Play the voice/sound
            
            // Visual feedback
            const btn = event.target;
            btn.innerText = "✓ Added";
            btn.style.background = "#e7e9ec";
            setTimeout(() => {
                btn.innerText = "Add to Bag";
                btn.style.background = "var(--amazon-yellow)";
            }, 600);
        }

        function menuSelect(el, cat) {
            document.querySelectorAll('#mainMenu a').forEach(a => a.classList.remove('active'));
            el.classList.add('active');
            const filtered = cat === 'All' ? products : products.filter(p => p.category === cat);
            document.getElementById('catLabel').innerText = `${cat} (${filtered.length})`;
            renderProducts(filtered);
        }

        renderProducts(products);
    </script>
</body>
</html>
